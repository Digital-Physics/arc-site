<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARC Solver Pipeline</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  h1 {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 32px;
  }

  .chart-wrap {
    width: 100%;
    max-width: 720px;
  }

  svg {
    width: 100%;
    height: auto;
    display: block;
  }

  /* Node hover */
  .node {
    cursor: pointer;
  }
  .node rect, .node path {
    transition: opacity 0.15s;
  }
  .node:hover rect, .node:hover path {
    opacity: 0.85;
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    color: #ccc;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 220px;
    line-height: 1.5;
    z-index: 100;
  }
  .tooltip.visible { opacity: 1; }

  .legend {
    display: flex;
    gap: 20px;
    margin-top: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #888;
  }
  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
  }
</style>
</head>
<body>

<h1>ARC Solver — Pipeline</h1>

<div class="chart-wrap">
<svg viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Task Input -->
<g class="node" data-tip="Training pairs + test input. Each grid is a 2D array of integers 0–9.">
  <rect x="240" y="30" width="200" height="44" rx="8" fill="#2a2a2a" stroke="#555" stroke-width="0.5"/>
  <text x="340" y="52" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#e0e0e0">ARC task</text>
</g>

<line x1="340" y1="74" x2="340" y2="108" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- compute_task_stats -->
<g class="node" data-tip="Single-pass feature extraction: per-pair color counts, object sizes, color maps. Cross-pair: consistency signals, select-recolor candidates, key-body detection.">
  <rect x="200" y="108" width="280" height="56" rx="8" fill="#2a1f40" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="128" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#AFA9EC">compute_task_stats</text>
  <text x="340" y="148" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#7F77DD">Per-pair + cross-pair features</text>
</g>

<line x1="340" y1="164" x2="340" y2="198" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- infer_output_guided_params -->
<g class="node" data-tip="Detects consistent signals across all training pairs: fg_color, diagonal_dir, shift_rule, key_body_signal, select_recolor_src/dst, marker_color, obj_* signals.">
  <rect x="190" y="198" width="300" height="56" rx="8" fill="#2a1f40" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="218" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#AFA9EC">infer_output_guided_params</text>
  <text x="340" y="238" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#7F77DD">diagonal_dir, key_body_signal, etc.</text>
</g>

<line x1="340" y1="254" x2="340" y2="288" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Lookup solver -->
<g class="node" data-tip="Canonical hash matching against previously seen tasks. Fast exact match — fires before any search begins.">
  <rect x="200" y="288" width="280" height="56" rx="8" fill="#1a2e28" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="340" y="308" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#9FE1CB">Lookup solver</text>
  <text x="340" y="328" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#1D9E75">Canonical hash matching</text>
</g>
<line x1="480" y1="316" x2="574" y2="316" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow-teal)"/>
<text x="510" y="308" font-size="11" fill="#1D9E75">solved</text>
<g class="node" data-tip="Final output: up to 2 grid guesses submitted to ARC evaluator.">
  <rect x="574" y="298" width="72" height="36" rx="8" fill="#1a2e28" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="610" y="316" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#9FE1CB">Output</text>
</g>

<line x1="340" y1="344" x2="340" y2="378" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
<text x="350" y="366" font-size="11" fill="#666">unsolved</text>

<!-- Pass 1 -->
<g class="node" data-tip="base_programs() + parameterized_programs(task). Short template programs filtered by program_compatible(). Catches ~40–50 tasks before beam search.">
  <rect x="200" y="378" width="280" height="56" rx="8" fill="#1a2340" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="398" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#85B7EB">Pass 1</text>
  <text x="340" y="418" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#378ADD">base_programs + parameterized_programs</text>
</g>
<line x1="480" y1="406" x2="574" y2="406" stroke="#378ADD" stroke-width="1" marker-end="url(#arrow-blue)"/>
<text x="510" y="398" font-size="11" fill="#378ADD">solved</text>
<g class="node" data-tip="Final output: up to 2 grid guesses submitted to ARC evaluator.">
  <rect x="574" y="388" width="72" height="36" rx="8" fill="#1a2340" stroke="#378ADD" stroke-width="0.5"/>
  <text x="610" y="406" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#85B7EB">Output</text>
</g>

<line x1="340" y1="434" x2="340" y2="468" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- build_step_menu -->
<g class="node" data-tip="Builds ~500 candidate steps per task. Includes parameter-free steps, task-guided steps (diagonal_dir, select_recolor, key_body_recolor), and invertible steps for backward matching.">
  <rect x="200" y="468" width="280" height="56" rx="8" fill="#1a2340" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="488" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#85B7EB">build_step_menu</text>
  <text x="340" y="508" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#378ADD">~500 guided + invertible steps</text>
</g>

<line x1="340" y1="524" x2="340" y2="558" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Backward states (side branch) -->
<g class="node" data-tip="Applies invertible steps (rotate, reflect, recolor, shift) to training outputs to produce depth-1 backward target grids. Used for bidirectional matching in beam + post-pass.">
  <rect x="28" y="558" width="172" height="56" rx="8" fill="#2e2410" stroke="#BA7517" stroke-width="0.5"/>
  <text x="114" y="578" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#FAC775">Backward states</text>
  <text x="114" y="598" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#BA7517">Invertible steps on outputs</text>
</g>
<line x1="200" y1="586" x2="240" y2="586" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow-amber)" stroke-dasharray="4 3"/>

<!-- Beam search -->
<g class="node" data-tip="Beam width 512, max depth 4, 120s budget. Composite sort: (-exact_pairs, score, best_backward_score). Depth-boundary backward sweep checks surviving nodes against backward targets.">
  <rect x="200" y="558" width="280" height="56" rx="8" fill="#1a2340" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="578" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#85B7EB">Beam search</text>
  <text x="340" y="598" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#378ADD">Width 512, depth 4, 120s</text>
</g>
<line x1="480" y1="586" x2="574" y2="586" stroke="#378ADD" stroke-width="1" marker-end="url(#arrow-blue)"/>
<text x="510" y="578" font-size="11" fill="#378ADD">solved</text>
<g class="node" data-tip="Final output: up to 2 grid guesses submitted to ARC evaluator.">
  <rect x="574" y="568" width="72" height="36" rx="8" fill="#1a2340" stroke="#378ADD" stroke-width="0.5"/>
  <text x="610" y="586" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#85B7EB">Output</text>
</g>

<line x1="340" y1="614" x2="340" y2="648" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- BG retry + post-pass -->
<g class="node" data-tip="BG retry: if no bg=0 in input, retry beam forcing bg=0. Near-miss post-pass: try cheap color steps + backward sweep on nodes scoring &lt; 0.15.">
  <rect x="180" y="648" width="320" height="56" rx="8" fill="#1a2340" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="668" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#85B7EB">BG retry + near-miss post-pass</text>
  <text x="340" y="688" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#378ADD">Backward sweep + cheap extensions</text>
</g>
<line x1="500" y1="676" x2="574" y2="676" stroke="#378ADD" stroke-width="1" marker-end="url(#arrow-blue)"/>
<text x="510" y="668" font-size="11" fill="#378ADD">solved</text>
<g class="node" data-tip="Final output: up to 2 grid guesses submitted to ARC evaluator.">
  <rect x="574" y="658" width="72" height="36" rx="8" fill="#1a2340" stroke="#378ADD" stroke-width="0.5"/>
  <text x="610" y="676" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#85B7EB">Output</text>
</g>

<line x1="340" y1="704" x2="340" y2="738" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Informed fallback -->
<g class="node" data-tip="If nothing solved: guess 1 = beam_best (beam's highest-scoring partial program applied to test input). Guess 2 = rotate_180 of guess 1.">
  <rect x="200" y="738" width="280" height="56" rx="8" fill="#2a2a2a" stroke="#555" stroke-width="0.5"/>
  <text x="340" y="758" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#e0e0e0">Informed fallback</text>
  <text x="340" y="778" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#888">beam_best partial → guess 1</text>
</g>

<line x1="340" y1="794" x2="340" y2="828" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Output -->
<g class="node" data-tip="Up to 2 grid guesses submitted. Solve rate: ~104/1000 on ARC-AGI training set (April 2026).">
  <rect x="230" y="828" width="220" height="56" rx="8" fill="#1a2e28" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="340" y="848" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#9FE1CB">Guesses (up to 2)</text>
  <text x="340" y="868" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#1D9E75">Program name + output grid</text>
</g>

</svg>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#7F77DD"></div>Inference</div>
  <div class="legend-item"><div class="legend-dot" style="background:#378ADD"></div>Search</div>
  <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div>Input / Output</div>
  <div class="legend-item"><div class="legend-dot" style="background:#BA7517"></div>Backward states</div>
</div>

<div class="tooltip" id="tip"></div>

<script>
const tip = document.getElementById('tip');
document.querySelectorAll('.node').forEach(node => {
  const text = node.dataset.tip;
  if (!text) return;
  node.addEventListener('mousemove', e => {
    tip.textContent = text;
    tip.classList.add('visible');
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top  = (e.clientY - 10) + 'px';
  });
  node.addEventListener('mouseleave', () => tip.classList.remove('visible'));
});
</script>
</body>
</html>
